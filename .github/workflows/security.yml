name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

jobs:
  security:
    runs-on: ubuntu-latest
    # Warning-only: does not block merges, but results are visible in PR checks.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: bandit (OWASP code patterns)
        run: uv run bandit -r src --severity-level=medium -f json -o bandit-results.json || true

      - name: pip-audit (CVE dependency scan)
        run: uv run pip-audit --format=json --output=pip-audit-results.json || true

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: |
            bandit-results.json
            pip-audit-results.json
